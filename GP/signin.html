<!DOCTYPE html>
<html lang="en">

<head>
  <title>Sign in</title>
  <link rel="icon" href="images/icon.png" type="image/png">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="styles/signin.css" rel="stylesheet" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" />


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
</head>

<body class="text-center">
  <main class="form-signin card shadow">
    <form class="">
      <img id="logo" class="mb-4" src="images/logo.png" alt="" />
      <h1 class="h3 mb-3 fw-normal">Please sign in</h1>

      <div class="form-floating">
        <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com" />
        <label for="floatingInput">Email address</label>
      </div>
      <div class="form-floating">
        <input type="password" class="form-control" id="floatingPassword" placeholder="Password" />
        <label for="floatingPassword">Password</label>
        <div class="my-2 w-100">
          <a href="forgot_password.html">Forgot Passowrd ?</a>
        </div>
      </div>

      <div class="checkbox mb-3">
        <label>
          <input type="checkbox" value="remember-me" /> Remember me
        </label>
      </div>
      <button class="w-100 btn btn-lg" type="submit">Sign in</button>
      <p class="mt-5 mb-3">
        <a class="text-muted" href="index.html">Home</a> | Don't have an
        account ?
        <a href="register.html">Register</a>
      </p>
      <p class="mt-5 mb-3 text-muted">&copy; CO-Academy</p>
    </form>
  </main>
</body>

</html>
